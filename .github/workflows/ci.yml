# CI — 모든 PR/push 에서 실행되는 검증 워크플로우.
# release.yml 은 tag push 시에만 실행되는 별도 워크플로우.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test + Clippy (acp+mtls)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fleet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fleet_test
      SQLX_OFFLINE: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (acp+mtls)
        run: cargo clippy --workspace --features "acp mtls" --all-targets -- -D warnings

      - name: cargo test (acp+mtls)
        # --test-threads=1 필수: fleet-store integration test 가 TRUNCATE ... CASCADE 로
        # 매 테스트마다 테이블을 비우므로 병렬 실행하면 race condition 발생.
        # cf. crates/fleet-store/tests/integration.rs 헤더 주석.
        run: cargo test --workspace --features "acp mtls" -- --test-threads=1

  test-no-default:
    name: Test + Clippy (no features)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fleet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fleet_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nodefault-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo clippy (no-default-features)
        run: cargo clippy --workspace --no-default-features --all-targets -- -D warnings
      - name: cargo test (no-default-features)
        # 위 test job 과 동일한 이유로 직렬 실행.
        run: cargo test --workspace --no-default-features -- --test-threads=1

  shellcheck:
    name: Shellcheck install/uninstall
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
        env:
          SHELLCHECK_OPTS: -x -e SC2016
