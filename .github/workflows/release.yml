# Phase 8.5.4: GitHub Actions release workflow.
#
# 동작:
# 1. `git tag v0.1.0 && git push --tags` 하면 트리거.
# 2. 4개 플랫폼 매트릭스 병렬 빌드:
#    - x86_64-unknown-linux-gnu
#    - aarch64-unknown-linux-gnu  (cross)
#    - x86_64-apple-darwin
#    - aarch64-apple-darwin
# 3. tarball: fleet + fleet-worker + install.sh + README.md → fleet-<tag>-<target>.tar.gz
# 4. checksums.txt 파일 생성 (sha256).
# 5. GitHub Release 업로드.
#
# 크로스 컴파일은 cross-rs 사용 (Docker 기반).
# macOS 빌드는 자체 runner 로 직접 빌드 (cross 불필요).

name: release

on:
  push:
    tags:
      - "v*"
  # 수동 트리거 (tag 없이 테스트용).
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix)"
        required: true
        default: "0.0.0-test"

permissions:
  contents: write  # GitHub Release 생성 권한.

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (release)
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }} --features "acp mtls"
          else
            cargo build --release --target ${{ matrix.target }} --features "acp mtls"
          fi

      - name: Package tarball
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME:-v${{ github.event.inputs.version }}}"
          # v 접두사 제거 (tarball 이름은 tag 그대로 유지).
          TARBALL="fleet-${VERSION}-${{ matrix.target }}.tar.gz"
          STAGE="$(mktemp -d)"
          cp target/${{ matrix.target }}/release/fleet "${STAGE}/"
          cp target/${{ matrix.target }}/release/fleet-worker "${STAGE}/"
          cp install.sh README.md "${STAGE}/"
          tar -C "${STAGE}" -czf "${TARBALL}" fleet fleet-worker install.sh README.md
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Created ${TARBALL}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target }}
          path: "*.tar.gz"
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Generate checksums.txt
        run: |
          cd artifacts
          # shellcheck disable=SC2086  # GITHUB_REF_NAME 은 안전한 문자열.
          sha256sum ./*.tar.gz > "fleet-${GITHUB_REF_NAME:-v${{ github.event.inputs.version }}}-checksums.txt"
          # 모든 tarball 의 sha256 을 한 파일에 (이름 규칙은 install.sh 와 일치).
          sha256sum ./*.tar.gz > checksums.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
            artifacts/fleet-*-checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v0.1.0-pre → prerelease
